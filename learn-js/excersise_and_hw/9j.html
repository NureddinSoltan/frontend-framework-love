<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Projects</title>
</head>

<body>

  <p>Youtube Subscribe Button</p>
  <button onclick="
  Subscribe()
  " class="js-subscrube-button">
    Subscribe
  </button>

  <p>Amazon Shipping Calculate</p>
  <input type="number" placeholder="Cost of order" class="js-cost-input" onkeydown="handleCostKeydown(event)
  ">

  <button onclick="
  calculateTotal()
  ">Calculate</button>
  <p class="js-total-cost"></p>

  <script>

    function handleCostKeydown(event) {
      if (event.key === 'Enter') {
        calculateTotal()
      }
    }
    function calculateTotal() {
      const inputElement = document.querySelector('.js-cost-input');
      let cost = Number(inputElement.value) * 100;

      if (cost < 4000) {
        cost = cost + 1000.0;
      }

      document.querySelector('.js-total-cost')
        .innerHTML = `$${cost / 100}`;
        // .innerHTML = `$${cost.toFixed(2)}`;
    }

    function Subscribe() {
      const buttonElement = document.querySelector('.js-subscrube-button');

      if (buttonElement.innerText === 'Subscribe') {
        buttonElement.innerHTML = 'Subscribed';
      } else {
        buttonElement.innerHTML = 'Subscribe';
      }

    }
  </script>
</body>

</html>
