<!DOCTYPE html>
<html>

<head></head>

<body>

  <button onclick="playGame('heads')">
    Heads
  </button>


  <button onclick="playGame('tails')">
    Tails
  </button>

  <script>
    let score = JSON.parse(localStorage.getItem('score')) || {
      wins: 0,
      lose: 0,
    }


    function playGame(guess) {
      const randomNumber = Math.random();
      const result = randomNumber < 0.5 ? 'heads' : 'tails';

      if (guess === result) {
        score.wins++
        console.log('You win!');
      } else {
        score.lose++
        console.log('You lose!')
      }

      localStorage.setItem('score', JSON.stringify(score))
      console.log(score)
    }
  </script>
</body>

</html>
