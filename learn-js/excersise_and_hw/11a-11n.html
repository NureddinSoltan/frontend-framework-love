  <script>
    // 11a
    const nums = [10, 20, 30]
    nums[2] = 99
    console.log(nums)


    // 11b
    console.log(getLastValue([1, 20, 22, 24, 5]));
    console.log(getLastValue(['hi', 'hello', 'good']));

    function getLastValue(array) {
      return array[array.length - 1]
    }

    // 11c
    console.log(arraySwap([1, 20, 22, 24, 5]));
    console.log(arraySwap(['hi', 'hello', 'good']));

    function arraySwap(array) {
      temp = array[0]
      array[0] = array[array.length - 1]
      array[array.length - 1] = temp
      return array
    }

    // 11d
    for (let i = 0; i <= 10; i += 2) {
      console.log(i)
    }

    // 11e
    for (let i = 5; i >= 0; i--) {
      console.log(i)
    }
    console.log("break")
    // 11f
    let i = 0
    while (i <= 10) {
      console.log(i)
      i += 2
    }

    console.log("break")
    let j = 5
    while (j >= 0) {
      console.log(j)
      j--
    }

    console.log('break')

    // 11g
    const arrNums = [1, 2, 3]
    for (let i = 0; i < arrNums.length; i++) {
      arrNums[i] = arrNums[i] + 1
    }
    console.log(arrNums)
    // Alternative solution:
    const array = [1, 2, 3];
    const result = [];

    for (let i = 0; i < array.length; i++) {
      result.push(array[i] + 1);
    }
    console.log(result);

    // 11h
    function addOne(array) {
      const addOneResult = []
      for (let i = 0; i < array.length; i++) {
        addOneResult.push(array[i] + 1)
      }
      return addOneResult
    }
    console.log(addOne([4, 5, 6]))
    console.log(addOne([-2, -1, 0, 99]))

    console.log('break')
    // 11j
    function addArrays(array1, array2) {
      const result = []
      for (let i = 0; i < array1.length; i++) {
        result.push(array1[i] + array2[i])
      }
      return result
    }

    console.log(addArrays([1, 1, 2], [1, 1, 3]))
    console.log(addArrays([1, 2, 3], [4, 5, 6]));

    console.log('break')

    // 11k
    function countPositive(nums) {
      let result = 0
      for (let i = 0; i < nums.length; i++) {
        if (nums[i] > 0) {
          result++
        }
      }
      return result
    }

    console.log(countPositive([1, -3, 5]))
    console.log(countPositive([-2, 3, -5, 7, 10]))

    // 11l - 11m
    function minMax(nums) {
      const result = {
        min: 0,
        max: 0,
      }
      let min = nums[0]
      let max = nums[0]
      for (let i = 1; i < nums.length; i++) {
        // find the min number
        if (nums[i] < min) {
          min = nums[i]
        }
        if (nums[i] > min) {
          max = nums[i]
        }
      }
      result.min = min
      result.max = max
      return (result)
    }
    console.log(minMax([1, -3, 5]))
    console.log(minMax([-2, 3, -5, 7, 10]))

    // Alternative solution
    function minMax1(nums) {
      const result = {
        min: nums[0],
        max: nums[0],
      };
      if (nums.length === 0) {
        result.min = null;
        result.max = null;
        return result;
      }

      for (let i = 0; i < nums.length; i++) {
        const value = nums[i];

        if (nums[i] < result.min) {
          result.min = value;
        }
        if (nums[i] > result.max) {
          result.max = value
        }
      }

      // here's an alternative solution for that one

      /*for (let i = 0; i < nums.length; i++) {
        const value = nums[i];

        // If the min is null OR the value is
        // less than the min, update the min.
        if (result.min === null || value < result.min) {
          result.min = value;
        }

        // If the max is null OR the value is
        // greater than the max, update the max.
        if (result.max === null || value > result.max) {
          result.max = value;
        }
      }*/

      return result;
    }

    console.log(minMax1([-1, -3, 5]));
    console.log(minMax1([-2, 3, -5, 7, 10]));
    console.log(minMax1([]));

    console.log('break')


    // 11n
    function countWords(words) {
      const wordsobj = {};

      for (let i = 0; i < words.length; i++) {
        if (words[i] in wordsobj) {
          wordsobj[words[i]] += 1
        }
        else {
          wordsobj[words[i]] = 1
        }
      }
      return wordsobj
    }
    console.log(countWords(['apple', 'grape', 'apple', 'apple']))

    // Same but alternative
    function countWords1(words) {
      const result = {};

      for (let i = 0; i < words.length; i++) {
        const word = words[i];

        if (!result[word]) {
          result[word] = 1;
        } else {
          result[word]++;
        }
      }

      return result;
    }
    console.log(countWords1(['apple', 'grape', 'apple', 'apple']));
