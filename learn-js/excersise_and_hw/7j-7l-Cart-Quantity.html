<!DOCTYPE html>
<html>
  <head></head>
  <body>
    <p>
      <button onclick="
        calculation(`1`);
      ">1</button>

      <button onclick="
        calculation(`2`);
      ">2</button>

      <button onclick="
        calculation(`3`);
      ">3</button>

      <button onclick="
        calculation(`+`);
      ">+</button>
    </p>

    <p>
      <button onclick="
        calculation(`4`);
      ">4</button>

      <button onclick="
        calculation(`5`);
      ">5</button>

      <button onclick="
        calculation(`6`);
      ">6</button>

      <button onclick="
        calculation(`-`);
      ">-</button>
    </p>

    <p>
      <button onclick="
        calculation(`7`);
      ">7</button>

      <button onclick="
        calculation(`8`);
      ">8</button>

      <button onclick="
        calculation(`9`);
      ">9</button>

      <button onclick="
        calculation(`*`);
      ">*</button>
    </p>

    <p>
      <button onclick="
        calculation(`0`);
      ">0</button>

      <button onclick="
        calculation(`.`);
      ">.</button>

      <button onclick="
        calculation(`=`);
      ">=</button>

      <button onclick="
        calculation(`/`);
      ">/</button>
    </p>

    <p>
      <button onclick="
        calculation(`Clear`);
      ">Clear</button>
    </p>

    <script>
      let calcValue = '';

      function calculation(val) {
        if (val === 'Clear') {
          calcValue = '';
          console.log('Cleared.');
        } else if (val === '=') {
          calcValue = eval(calcValue);
          console.log(calcValue);
        } else {
          calcValue += val;
          console.log(calcValue);
        }
      }
    </script>
  </body>
</html>
